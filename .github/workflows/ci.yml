name: CI

on:
  pull_request:
  push:
    branches:
      - dev
      - main
      - master

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.6.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          cache: pnpm
          node-version: 24

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Check package exports
        run: |
          node -e "const pkg = require('./package.json'); for (const key of ['.', './contracts', './styles.css']) { if (!pkg.exports?.[key]) { throw new Error('Missing export: ' + key); } }"

      - name: Build
        run: pnpm build

      - name: Check npm tarball
        run: pnpm pack --dry-run
